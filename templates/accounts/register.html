{% extends 'base.html' %}
{% block title %}Register · AI Resume Analyzer{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="brand" style="margin-left:0;margin-bottom:24px;"><span class="brand-mark"></span><span>AI Resume<br>Analyzer</span></div>
        <h1>Create account</h1>
        <p>Start your AI-powered resume optimization workflow.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn-primary" type="submit">Start free</button>
        </form>
        <p>Already registered? <a href="{% url 'login' %}">Login</a></p>
    </div>
</section>
{% endblock %}
